        <div class="jumper">

    <!-- ***** Contact Us Area Starts ***** -->
    <section class="section" id="contact-us">
        <div class="container">
            <div class="row">
                <div class="col-lg-4 col-md-4 col-xs-12">
                    <div class="left-text-content">
                        <div class="section-heading">
                            <h6 style="color: #e3722e">Contact Us</h6>
                            <h2>Feel free to keep in touch with us!</h2>
                        </div>
                        <ul class="contact-info">
                            <li><img src="assets/images/contact-info-01.png" alt="phone">080 080 0990</li>
                            <li> <img src="assets/images/contact-info-02.png" alt="">info@sportclub.com</li>
                            <li><img src="assets/images/contact-info-03.png"  alt="">www.sportclub.com</li>
                        </ul>
                    </div>
                </div>
                <div class="col-lg-8 col-md-8 col-xs-12">
                    <div class="contact-form">
                        <form id="contact" action="/form" method="POST" onsubmit="validateForm()" >
                          <div class="row">
                            <div class="col-md-6 col-sm-12">
                              <fieldset>
                                <input name="name" type="text" id="name" placeholder="Your Name *" required="">
                              </fieldset>
                            </div>
                            <div class="col-md-6 col-sm-12">
                              <fieldset>
                                <input name="phone" type="text" id="phone" placeholder="Your Phone *" required="">
                              </fieldset>
                            </div>
                            <div class="col-md-6 col-sm-12">
                              <fieldset>
                                <input name="email" type="email" id="email" placeholder="Your Email *" required="">
                              </fieldset>
                            </div>
                            <div class="col-md-6 col-sm-12">
                              <fieldset>
                                <input name="subject" type="text" id="subject" placeholder="Subject">
                              </fieldset>
                            </div>
                            <div class="col-lg-12">
                              <fieldset>
                                <textarea name="message" rows="6" id="message" placeholder="Message *" required=""></textarea>
                              </fieldset>
                            </div>
                            <div class="col-lg-12">
                              <fieldset>
                                <button type="submit" id="form-submit" class="main-button-icon" onclick="saveformdets()">Send Message Now <i class="fa fa-arrow-right"></i></button>
                              </fieldset>
                            </div>
                          </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- ***** Contact Us Area Ends ***** -->
    
    <!-- ***** Footer Start ***** -->

        <div class="container">

                <div class="col-lg-6 col-xs-12">

    <script src="assets/js/custom.js"></script>

    <script>


        function validateForm() {
            let name = document.getElementById("name").value;
            let ph = document.getElementById("phone").value;
            let mail = document.getElementById("email").value;
            let subj = document.getElementById("subject").value;
            let mess = document.getElementById("message").value;
            var atposition=mail.indexOf("@");  
            var dotposition=mail.lastIndexOf("."); 
          
            
    
            if (name.length < 3 ) {
                alert("Name not valid");
         
            }
            else if(atposition<1 || dotposition<atposition+2 || dotposition+2>=mail.length){
                alert("Email Id not valid");
        
            }
            else if(ph.length!=10){
                alert("Phone No. not valid");
        
            }
            else{
                alert("Form Submitted!!")
            }
         
            }

    </script>
